<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="./style.css" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css"
			integrity="sha384-vlBdW0r3AcZO/HboRPznQNowvexd3fY8qHOWkBi5q7KGgqJ+F48+DceybYmrVbmB"
			crossorigin="anonymous"
		/>
		<script type="module" defer>
			import { parseMarkdown } from './markdown-renderer.js';
			import { updateTheme } from './theme.js';

			updateTheme(Math.random() * 360);

			const str = await parseMarkdown('README.md');
			document.querySelector('.md-container').innerHTML = str;
		</script>
	</head>
	<body>
		<div class="md-container"></div>

		<script src="./markdown-renderer.js" type="module" defer></script>
		<script defer>
			const startQueue = {};

			function registerStart(setup, name) {
				const result = setup();

				const frame = {
					data: result.data,
					start: result.start,
					stop: result.stop,
					obj: document.getElementById(name),
					currState: 'stop',
				};

				frame.start = frame.start.bind(frame);
				frame.stop = frame.stop.bind(frame);

				startQueue[name] = frame;

				const observer = new IntersectionObserver((entries) => {
					const intersecting = entries[0].isIntersecting;
					setSnippetState(name, intersecting ? 'start' : 'stop');
				});

				observer.observe(frame.obj);
			}

			function setSnippetState(name, state) {
				if (startQueue[name].currState == state) return;

				startQueue[name][state]();
				startQueue[name].currState = state;

				if (state == 'start') resizeIframe(name);
			}

			function resizeIframe(id) {
				const obj = document.getElementById(id);
				obj.style.height =
					obj.contentWindow.document.documentElement.scrollHeight +
					'px';
			}
		</script>
	</body>
</html>
